name: ${COMPOSE_PROJECT_NAME:-limra_aggressive}

services:
  limra-web:
    build:
      context: apps/limra-web
      dockerfile: Dockerfile
      args:
        USE_SLIM: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      limra-runner:
        condition: service_started
    ports:
      - "${LIMRA_WEB_PORT:-3001}:8080"
    environment:
      PORT: "8080"
      WEBUI_NAME: limra
      LIMRA_API_BASE_URL: /api/limra
      LIMRA_RUNNER_INTERNAL_URL: http://limra-runner:8091
      LIMRA_RUNNER_SERVICE_TOKEN: ${RUNNER_SERVICE_TOKEN:?set RUNNER_SERVICE_TOKEN}
      LIMRA_REPOSITORY_BACKEND: postgres
      LIMRA_DATABASE_URL: postgresql://${POSTGRES_USER:-limra}:${POSTGRES_PASSWORD:-limra_dev_password}@postgres:5432/${POSTGRES_DB:-limra}
      LIMRA_RUNTIME_STATE_BACKEND: redis
      DATABASE_URL: postgresql://${POSTGRES_USER:-limra}:${POSTGRES_PASSWORD:-limra_dev_password}@postgres:5432/${POSTGRES_DB:-limra}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${MINIO_BUCKET:-limra-artifacts}
    networks:
      - limra

  limra-runner:
    build:
      context: .
      dockerfile: deploy/limra/runner.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${LIMRA_RUNNER_PORT:-8091}:8091"
    environment:
      MIROTHINKER_RUNNER_PORT: "8091"
      RUNNER_SERVICE_TOKEN: ${RUNNER_SERVICE_TOKEN:?set RUNNER_SERVICE_TOKEN}
      RUNNER_TASK_STORE_BACKEND: postgres
      RUNNER_DATABASE_URL: postgresql://${POSTGRES_USER:-limra}:${POSTGRES_PASSWORD:-limra_dev_password}@postgres:5432/${POSTGRES_DB:-limra}
      DATABASE_URL: postgresql://${POSTGRES_USER:-limra}:${POSTGRES_PASSWORD:-limra_dev_password}@postgres:5432/${POSTGRES_DB:-limra}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${MINIO_BUCKET:-limra-artifacts}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-limra_minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-limra_minio_dev_password}
      BASE_URL: ${BASE_URL:-}
      DEFAULT_MODEL_NAME: ${DEFAULT_MODEL_NAME:-}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      E2B_API_KEY: ${E2B_API_KEY:-}
      SUMMARY_LLM_PROVIDER: ${SUMMARY_LLM_PROVIDER:-}
      SUMMARY_MODEL_NAME: ${SUMMARY_MODEL_NAME:-}
      SUMMARY_BASE_URL: ${SUMMARY_BASE_URL:-}
      SUMMARY_API_KEY: ${SUMMARY_API_KEY:-}
    volumes:
      - limra_runner_archives:/app/apps/gradio-demo/archives
      - limra_runner_runtime:/app/apps/gradio-demo/runtime
    networks:
      - limra

  postgres:
    build:
      context: .
      dockerfile: deploy/limra/postgres.Dockerfile
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-limra}
      POSTGRES_USER: ${POSTGRES_USER:-limra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-limra_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - limra_postgres_data:/var/lib/postgresql/data
      - ./deploy/limra/postgres/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - limra

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - limra_redis_data:/data
    networks:
      - limra

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_API_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-limra_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-limra_minio_dev_password}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - limra_minio_data:/data
    networks:
      - limra

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-limra_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-limra_minio_dev_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-limra-artifacts}
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    volumes:
      - ./deploy/limra/minio/init-bucket.sh:/init-bucket.sh:ro
    networks:
      - limra

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      limra-web:
        condition: service_started
    expose:
      - "8080"
    volumes:
      - ./deploy/limra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - limra

networks:
  limra:
    name: ${COMPOSE_PROJECT_NAME:-limra_aggressive}_network

volumes:
  limra_postgres_data:
  limra_redis_data:
  limra_minio_data:
  limra_runner_archives:
  limra_runner_runtime:
