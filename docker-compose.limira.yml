name: ${COMPOSE_PROJECT_NAME:-limira}

services:
  limira-web:
    build:
      context: apps/limira-web
      dockerfile: Dockerfile
      args:
        USE_SLIM: "true"
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "limira_native:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      limira-runner:
        condition: service_healthy
    ports:
      - target: 8080
        published: "${LIMIRA_WEB_PORT:-3001}"
        host_ip: "${LIMIRA_BIND_ADDRESS:-127.0.0.1}"
    environment:
      PORT: "8080"
      DATA_DIR: /app/backend/data
      LIMIRA_API_BASE_URL: /api/limira
      LIMIRA_AUTH_SQLITE_PATH: /app/backend/data/limira_auth.sqlite3
      LIMIRA_LEGACY_AUTH_SQLITE_PATH: /app/backend/data/legacy_auth.sqlite3
      LIMIRA_AUTH_SECRET: ${LIMIRA_AUTH_SECRET:?set LIMIRA_AUTH_SECRET}
      LIMIRA_RUNNER_INTERNAL_URL: http://limira-runner:8091
      LIMIRA_RUNNER_SERVICE_TOKEN: ${RUNNER_SERVICE_TOKEN:?set RUNNER_SERVICE_TOKEN}
      LIMIRA_REPOSITORY_BACKEND: postgres
      LIMIRA_DATABASE_URL: postgresql://${POSTGRES_USER:-limira}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-limira}
      LIMIRA_RUNTIME_STATE_BACKEND: redis
      LIMIRA_OBJECT_STORAGE_BACKEND: s3
      LIMIRA_OBJECT_BUCKET: ${MINIO_BUCKET:-limira-artifacts}
      LIMIRA_UPLOAD_EMBEDDINGS_ENABLED: ${LIMIRA_UPLOAD_EMBEDDINGS_ENABLED:-false}
      LIMIRA_EMBEDDING_PROVIDER: ${LIMIRA_EMBEDDING_PROVIDER:-disabled}
      LIMIRA_EMBEDDING_MODEL: ${LIMIRA_EMBEDDING_MODEL:-}
      LIMIRA_EMBEDDING_DIMENSIONS: ${LIMIRA_EMBEDDING_DIMENSIONS:-1536}
      LIMIRA_PDF_DEBUG_DIR: ${LIMIRA_PDF_DEBUG_DIR:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-limira}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-limira}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${MINIO_BUCKET:-limira-artifacts}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-limira_minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - limira_web_data:/app/backend/data
      - ${LIMIRA_PDF_DEBUG_HOST_DIR:-./data/limira-pdf-debug}:${LIMIRA_PDF_DEBUG_DIR:-/tmp/limira-pdf-debug}
    networks:
      - limira

  limira-runner:
    build:
      context: .
      dockerfile: deploy/limira/runner.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - target: 8091
        published: "${LIMIRA_RUNNER_PORT:-8091}"
        host_ip: "${LIMIRA_BIND_ADDRESS:-127.0.0.1}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8091/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      LIMIRA_RUNNER_INTERNAL_PORT: "8091"
      RUNNER_SERVICE_TOKEN: ${RUNNER_SERVICE_TOKEN:?set RUNNER_SERVICE_TOKEN}
      RUNNER_TASK_STORE_BACKEND: postgres
      RUNNER_DATABASE_URL: postgresql://${POSTGRES_USER:-limira}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-limira}
      DATABASE_URL: postgresql://${POSTGRES_USER:-limira}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-limira}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${MINIO_BUCKET:-limira-artifacts}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-limira_minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      BASE_URL: ${BASE_URL:-}
      DEFAULT_MODEL_NAME: ${DEFAULT_MODEL_NAME:-}
      DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      E2B_API_KEY: ${E2B_API_KEY:-}
      SUMMARY_LLM_MODEL_NAME: ${SUMMARY_LLM_MODEL_NAME:-}
      SUMMARY_LLM_BASE_URL: ${SUMMARY_LLM_BASE_URL:-}
      SUMMARY_LLM_API_KEY: ${SUMMARY_LLM_API_KEY:-}
    volumes:
      - limira_runner_archives:/app/apps/limira-runner/archives
      - limira_runner_runtime:/app/apps/limira-runner/runtime
    networks:
      - limira

  postgres:
    build:
      context: .
      dockerfile: deploy/limira/postgres.Dockerfile
    ports:
      - target: 5432
        published: "${POSTGRES_PORT:-5433}"
        host_ip: "${LIMIRA_BIND_ADDRESS:-127.0.0.1}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-limira}
      POSTGRES_USER: ${POSTGRES_USER:-limira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - limira_postgres_data:/var/lib/postgresql/data
      - ./deploy/limira/postgres/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - limira

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - target: 6379
        published: "${REDIS_PORT:-6380}"
        host_ip: "${LIMIRA_BIND_ADDRESS:-127.0.0.1}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - limira_redis_data:/data
    networks:
      - limira

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - target: 9000
        published: "${MINIO_API_PORT:-9002}"
        host_ip: "${LIMIRA_BIND_ADDRESS:-127.0.0.1}"
      - target: 9001
        published: "${MINIO_CONSOLE_PORT:-9003}"
        host_ip: "${LIMIRA_BIND_ADDRESS:-127.0.0.1}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-limira_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - limira_minio_data:/data
    networks:
      - limira

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-limira_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-limira-artifacts}
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    volumes:
      - ./deploy/limira/minio/init-bucket.sh:/init-bucket.sh:ro
    networks:
      - limira

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      limira-web:
        condition: service_started
    expose:
      - "8080"
    volumes:
      - ./deploy/limira/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - limira

networks:
  limira:
    name: ${COMPOSE_PROJECT_NAME:-limira}_network

volumes:
  limira_web_data:
  limira_postgres_data:
  limira_redis_data:
  limira_minio_data:
  limira_runner_archives:
  limira_runner_runtime:
