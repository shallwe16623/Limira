<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex,nofollow" />
		<title>limira OSINT 研究工作台</title>
		<link rel="stylesheet" href="/styles.css" />
		<script type="module" src="/app.js"></script>
	</head>
	<body>
		<div class="app-shell">
			<section id="authPanel" class="auth-layout hidden">
				<div class="auth-copy">
					<h1>研究、证据与导出集中在一个工作台。</h1>
				</div>
				<form id="authForm" class="auth-card">
					<div class="segmented-control" role="tablist" aria-label="账号类型">
						<button id="personalScopeButton" class="active" type="button">个人方式登录</button>
						<button id="enterpriseScopeButton" type="button">企业登录</button>
					</div>
					<div id="authModeControl" class="segmented-control" role="tablist" aria-label="登录模式">
						<button id="signinModeButton" class="active" type="button">登录</button>
						<button id="signupModeButton" type="button">注册</button>
					</div>
					<label id="organizationCategoryLabel" class="hidden">
						单位类别
						<select id="organizationCategorySelect"></select>
					</label>
					<label id="organizationLabel" class="hidden">
						单位
						<select id="organizationSelect"></select>
					</label>
					<label id="usernameLabel">
						用户名
						<input id="usernameInput" autocomplete="username" placeholder="请输入用户名" required />
					</label>
					<label id="nameLabel">
						姓名
						<input id="nameInput" autocomplete="name" placeholder="请输入姓名" />
					</label>
					<label id="emailLabel">
						邮箱
						<input id="emailInput" autocomplete="email" type="email" placeholder="you@example.com" required />
					</label>
					<label id="passwordLabel">
						密码
						<input id="passwordInput" autocomplete="current-password" type="password" required />
					</label>
					<label id="resetTokenLabel" class="hidden">
						重置令牌
						<input id="resetTokenInput" autocomplete="one-time-code" readonly />
					</label>
					<button id="authSubmitButton" class="primary-button" type="submit">登录</button>
					<button id="googleSigninButton" class="google-auth-button hidden" type="button">使用 Google 登录</button>
					<button id="wechatSigninButton" class="google-auth-button hidden" type="button">使用微信登录</button>
					<p id="enterpriseContactPrompt" class="enterprise-contact-prompt hidden">如需开通单位账号，请通过以下方式联系团队。</p>
					<div id="enterpriseContactActions" class="enterprise-contact-actions hidden" aria-label="企业账号联系入口">
						<a class="icon-link" href="tel:+8617267052536" title="电话联系销售" aria-label="电话联系销售">
							<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path d="M22 16.92V20C22 21.1046 21.1046 22 20 22C10.0589 22 2 13.9411 2 4C2 2.89543 2.89543 2 4 2H7.09C7.57973 2 7.99702 2.3534 8.07828 2.83612L8.91028 7.77712C8.98285 8.20805 8.76722 8.635 8.379 8.836L6.172 9.979C7.62736 13.3264 10.6736 16.3726 14.021 17.828L15.164 15.621C15.365 15.2328 15.792 15.0172 16.2229 15.0897L21.1639 15.9217C21.6466 16.003 22 16.4203 22 16.91V16.92Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
						</a>
						<a class="icon-link" href="mailto:admin@limira-inc.com" title="邮件联系销售" aria-label="邮件联系销售">
							<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path d="M4 5H20C21.1046 5 22 5.89543 22 7V17C22 18.1046 21.1046 19 20 19H4C2.89543 19 2 18.1046 2 17V7C2 5.89543 2.89543 5 4 5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M22 7L12 13L2 7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
						</a>
					</div>
					<div class="auth-links">
						<button id="forgotPasswordButton" type="button">忘记密码？</button>
						<button id="resendVerificationButton" type="button">重发验证邮件</button>
					</div>
					<div id="authMessage" class="inline-message"></div>
				</form>
			</section>

			<main id="workspace" class="workspace hidden">
				<!-- Sidebar (ChatGPT style Left Pane) -->
				<aside class="sidebar">
					<div class="sidebar-header">
						<button id="newChatButton" class="new-chat-btn" type="button">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
							<span>新研究</span>
						</button>
					</div>
					<div class="sidebar-body">
						<div class="sidebar-section-title">历史记录</div>
						<div id="historyMessage" class="inline-message"></div>
						<div id="historyList" class="history-list"></div>
					</div>
					<div class="sidebar-footer">
						<div class="task-status-row">
							<span id="statusLabel" class="status-pill">ready</span>
							<span id="taskLabel" class="task-label">暂无任务</span>
						</div>
						<div class="user-row">
							<button id="userSettingsButton" class="user-menu-button hidden" type="button" title="账号菜单" aria-label="账号菜单">
								<span id="sessionLabel" class="session-label">正在检查登录状态</span>
								<svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5A3.5 3.5 0 0 0 12 15.5Z" stroke="currentColor" stroke-width="2"/><path d="M19.43 12.98C19.47 12.66 19.5 12.34 19.5 12C19.5 11.66 19.47 11.34 19.43 11.02L21.54 9.37L19.54 5.91L17.05 6.91C16.52 6.5 15.94 6.16 15.3 5.91L14.92 3.25H10.92L10.54 5.91C9.9 6.16 9.32 6.5 8.79 6.91L6.3 5.91L4.3 9.37L6.41 11.02C6.37 11.34 6.34 11.66 6.34 12C6.34 12.34 6.37 12.66 6.41 12.98L4.3 14.63L6.3 18.09L8.79 17.09C9.32 17.5 9.9 17.84 10.54 18.09L10.92 20.75H14.92L15.3 18.09C15.94 17.84 16.52 17.5 17.05 17.09L19.54 18.09L21.54 14.63L19.43 12.98Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
							</button>
						</div>
						<div id="userSettingsPanel" class="settings-popover hidden">
							<div class="settings-title">设置</div>
							<div id="enterpriseAdminPanel" class="enterprise-admin-panel hidden">
								<div class="enterprise-admin-header">
									<div class="sidebar-section-title">单位管理</div>
									<button id="refreshEnterpriseAdminButton" class="ghost-button compact" type="button">刷新</button>
								</div>
								<div id="enterpriseUsageSummary" class="inline-message"></div>
								<form id="enterpriseMemberForm" class="compact-form">
									<input id="enterpriseMemberNameInput" placeholder="姓名" autocomplete="off" />
									<input id="enterpriseMemberUsernameInput" placeholder="用户名" autocomplete="username" />
									<input id="enterpriseMemberPasswordInput" type="password" placeholder="初始密码" autocomplete="new-password" />
									<select id="enterpriseMemberRoleSelect">
										<option value="member">成员</option>
									</select>
									<button id="createEnterpriseMemberButton" class="secondary-button" type="submit">添加成员账号</button>
								</form>
								<div id="enterpriseMemberMessage" class="inline-message"></div>
								<div id="enterpriseMemberList" class="compact-list"></div>
							</div>
							<button id="signOutButton" class="settings-menu-item danger" type="button">退出登录</button>
						</div>
					</div>
				</aside>

				<!-- Main Canvas -->
				<section class="main-content">
					<!-- Topbar integrated into main content area -->
					<header class="main-header">
						<div class="brand">limira OSINT</div>
						<div class="header-actions">
							<!-- Grouped Downloads -->
							<div class="download-group">
								<button id="exportPdfButton" class="ghost-button compact" type="button" title="导出并下载 PDF" aria-label="导出并下载 PDF" disabled>↓ PDF</button>
								<button id="downloadArchiveButton" class="ghost-button compact" type="button" disabled>↓ 归档</button>
							</div>
						</div>
					</header>

					<!-- Content Area -->
						<div class="scrollable-canvas">
							<!-- Tabs centered at top -->
							<nav id="artifactTabs" class="tabs" aria-label="研究成果标签页"></nav>

							<section id="artifactContent" class="artifact-content"></section>

						<!-- Hidden elements to preserve JS bindings -->
						<div class="hidden">
							<button id="refreshHistoryButton" type="button"></button>
							<button id="refreshArtifactsButton" type="button"></button>
							<button id="refreshUploadsButton" type="button"></button>
							<button id="uploadButton" type="button"></button>
							<div id="uploadMessage"></div>
							<input id="uploadSearchInput" />
							<button id="uploadSearchButton" type="button"></button>
							<div id="uploadList"></div>
							<div id="reportMessage"></div>
							<button id="clearStreamButton" type="button"></button>
							<div id="scenarioDetails"></div>
						</div>
					</div>

					<!-- Bottom Input Area (ChatGPT Style) -->
					<div class="input-container">
						<!-- Realtime Progress just above the input box -->
						<div id="messageList" class="message-list-bottom" aria-label="实时进展"></div>

						<form id="researchForm" class="chat-input-box">
							<div class="chat-input-top-bar">
								<!-- Upload Integration -->
								<label class="icon-button upload-trigger" title="上传知识库资料">
										<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M9 7C9 4.23858 11.2386 2 14 2C16.7614 2 19 4.23858 19 7V15C19 18.866 16.7614 22 14 22C11.2386 22 9 18.866 9 15V9C9 8.44772 9.44772 8 10 8C10.5523 8 11 8.44772 11 9V15C11 16.6569 12.3431 18 14 18C15.6569 18 17 16.6569 17 15V7C17 5.34315 15.6569 4 14 4C12.3431 4 11 5.34315 11 7V15C11 15.5523 11.4477 16 12 16C12.5523 16 13 15.5523 13 15V9C13 8.44772 13.4477 8 14 8C14.5523 8 15 8.44772 15 9V15C15 16.6569 13.6569 18 12 18C10.3431 18 9 16.6569 9 15V7Z" fill="currentColor"/></svg>
										<input id="uploadInput" type="file" class="hidden" />
									</label>

									<!-- Scenario Dropdown -->
								<div class="scenario-selector">
									<select id="scenarioSelect" class="subtle-select"></select>
									<button id="useScenarioButton" class="ghost-button compact" type="button">填入模板</button>
								</div>
							</div>

							<div class="chat-input-wrapper">
								<textarea id="queryInput" rows="1" placeholder="发送消息以开始 OSINT 研究..." required></textarea>
								<button id="submitResearchButton" class="send-button" type="submit" title="发送">
									<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 11L12 6L17 11M12 18V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
								</button>
							</div>
						</form>
						<div class="input-footer">
							limira OSINT 可能会犯错。请核查重要信息。
						</div>
					</div>
				</section>
			</main>
		</div>

		<!-- Sandbox Modal for Evidence Links -->
		<div id="sandboxModal" class="sandbox-modal hidden">
			<div class="sandbox-backdrop"></div>
			<div class="sandbox-content">
				<div class="sandbox-header">
					<div class="sandbox-title" id="sandboxTitle">网页预览</div>
					<div class="sandbox-actions">
						<a id="sandboxExternalLink" href="#" target="_blank" rel="noopener noreferrer" class="ghost-button compact" title="在新标签页中打开">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 13V19C18 19.5304 17.5523 20 17 20H5C4.44772 20 4 19.5304 4 19V7C4 6.44772 4.44772 6 5 6H11M15 4H20M20 4V9M20 4L10 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
						</a>
						<button id="sandboxCloseButton" class="ghost-button compact" type="button" title="关闭预览">
							<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
						</button>
					</div>
				</div>
				<div class="sandbox-iframe-container">
					<iframe id="sandboxIframe" src="" sandbox="allow-same-origin allow-scripts allow-popups allow-forms" title="Evidence Preview"></iframe>
				</div>
			</div>
		</div>
	</body>
</html>
