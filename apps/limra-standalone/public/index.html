<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="noindex,nofollow" />
		<title>limra OSINT 研究工作台</title>
		<link rel="stylesheet" href="/styles.css" />
		<script type="module" src="/app.js"></script>
	</head>
	<body>
		<div class="app-shell">
			<header class="topbar">
				<div>
					<div class="brand">limra OSINT</div>
					<div class="subtitle">独立研究工作台</div>
				</div>
				<div class="session-panel">
					<span id="sessionLabel" class="session-label">正在检查登录状态</span>
					<button id="signOutButton" class="ghost-button hidden" type="button">退出登录</button>
				</div>
			</header>

			<section id="authPanel" class="auth-layout hidden">
				<div class="auth-copy">
					<h1>研究、证据与导出集中在一个工作台。</h1>
					<p>
						此页面直接连接 limra 后端，不加载旧聊天壳、模型选择器或通用应用布局。
					</p>
				</div>
				<form id="authForm" class="auth-card">
					<div class="segmented-control" role="tablist" aria-label="登录模式">
						<button id="signinModeButton" class="active" type="button">登录</button>
						<button id="signupModeButton" type="button">注册</button>
					</div>
					<label>
						姓名
						<input id="nameInput" autocomplete="name" placeholder="请输入姓名" />
					</label>
					<label>
						邮箱
						<input id="emailInput" autocomplete="email" type="email" placeholder="you@example.com" required />
					</label>
					<label>
						密码
						<input id="passwordInput" autocomplete="current-password" type="password" required />
					</label>
					<button id="authSubmitButton" class="primary-button" type="submit">登录</button>
					<div id="authMessage" class="inline-message"></div>
				</form>
			</section>

			<main id="workspace" class="workspace hidden">
				<section class="left-pane">
					<div class="control-row">
						<div>
							<div class="section-label">研究任务</div>
							<div id="statusLabel" class="status-pill">ready</div>
						</div>
						<div id="taskLabel" class="task-label">暂无任务</div>
					</div>

					<section class="panel history-panel">
						<div class="panel-header">
							<h2>历史聊天</h2>
							<div class="history-actions">
								<button id="newChatButton" class="ghost-button compact" type="button">新聊天</button>
								<button id="refreshHistoryButton" class="ghost-button compact" type="button">刷新</button>
							</div>
						</div>
						<div id="historyMessage" class="inline-message"></div>
						<div id="historyList" class="history-list"></div>
					</section>

					<div class="scenario-bar">
						<label>
							场景
							<select id="scenarioSelect"></select>
						</label>
						<button id="useScenarioButton" class="ghost-button" type="button">使用场景问题</button>
					</div>
					<div id="scenarioDetails" class="scenario-details"></div>

					<form id="researchForm" class="research-form">
						<textarea
							id="queryInput"
							rows="5"
							placeholder="输入一个 OSINT 研究问题"
							required
						></textarea>
						<div class="action-row">
							<button id="submitResearchButton" class="primary-button" type="submit">开始研究</button>
							<button id="refreshArtifactsButton" class="ghost-button" type="button">刷新成果</button>
							<button id="downloadArchiveButton" class="ghost-button" type="button" disabled>下载归档</button>
						</div>
					</form>

					<section class="panel">
						<div class="panel-header">
							<h2>实时进展</h2>
							<button id="clearStreamButton" class="ghost-button compact" type="button">清空</button>
						</div>
						<div id="messageList" class="message-list"></div>
					</section>
				</section>

				<section class="right-pane">
					<nav id="artifactTabs" class="tabs" aria-label="研究成果标签页"></nav>
					<section id="artifactContent" class="artifact-content"></section>
				</section>

				<aside class="side-pane">
					<section class="panel">
						<div class="panel-header">
							<h2>上传资料</h2>
							<button id="refreshUploadsButton" class="ghost-button compact" type="button">刷新</button>
						</div>
						<input id="uploadInput" type="file" />
						<button id="uploadButton" class="secondary-button" type="button">上传文档</button>
						<div id="uploadMessage" class="inline-message"></div>
						<div class="search-row">
							<input id="uploadSearchInput" placeholder="搜索已上传资料" />
							<button id="uploadSearchButton" class="ghost-button" type="button">搜索</button>
						</div>
						<div id="uploadList" class="compact-list"></div>
					</section>

					<section class="panel">
						<div class="panel-header">
							<h2>报告导出</h2>
						</div>
						<button id="exportPdfButton" class="secondary-button" type="button" disabled>导出并下载 PDF</button>
						<div id="reportMessage" class="inline-message"></div>
					</section>

					<section class="panel">
						<div class="panel-header">
							<h2>事件日志</h2>
						</div>
						<div id="eventLog" class="event-log"></div>
					</section>
				</aside>
			</main>
		</div>
	</body>
</html>
